<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusAgent</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⬡</span>
                    <span class="logo-text">NexusAgent</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="sidebar-info">
                <div class="info-item">
                    <span class="info-label">Model</span>
                    <span class="info-value" id="modelName">Qwen3-8B</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status</span>
                    <span class="info-value status-dot" id="serverStatus">Checking...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Search</span>
                    <span class="info-value" id="searchBackend">Serper.dev</span>
                </div>
            </div>
        </aside>

        <!-- Main chat area -->
        <main class="main">

            <!-- Header -->
            <header class="chat-header">
                <h1 class="chat-title">NexusAgent</h1>
                <p class="chat-subtitle">Local AI · Real-time Web Search · Tool Calling</p>
            </header>

            <!-- Messages -->
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">⬡</div>
                    <h2>How can I help you?</h2>
                    <p>I can answer questions and search the web for real-time information.</p>
                    <div class="suggestions">
                        <button class="suggestion-btn">What's happening in AI today?</button>
                        <button class="suggestion-btn">Latest news on open source LLMs</button>
                        <button class="suggestion-btn">How does retrieval augmented generation work?</button>
                        <button class="suggestion-btn">Best lightweight models for local inference</button>
                    </div>
                </div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" class="user-input" placeholder="Ask anything..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Running locally on your machine · Sources cited inline</p>
            </div>

        </main>
    </div>

    <script src="/static/js/ui.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/stream.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
